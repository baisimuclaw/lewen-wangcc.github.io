{{ define "main" }}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <header class="mb-5">
        <h1 class="mb-3">{{ .Title }}</h1>
        {{ with .Params.description }}<p class="text-muted mb-0">{{ . }}</p>{{ end }}
      </header>
      <div class="d-flex flex-column gap-4">
        {{ range .Pages.ByDate.Reverse }}
        <article class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <div class="small text-muted mb-2">{{ .Date.Format "Jan 2, 2006" }}</div>
            <h2 class="h4 mb-2"><a class="text-decoration-none" href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
            {{ with .Summary }}<p class="mb-0">{{ . }}</p>{{ end }}
          </div>
        </article>
        {{ end }}
      </div>
    </div>
  </div>
</div>
{{ end }}
