<script>
  document.addEventListener('DOMContentLoaded', function () {
    function detectLang(code) {
      if (!code) return '';
      var lang = code.getAttribute('data-lang') || '';
      if (!lang && code.className) {
        var match = code.className.match(/language-([a-zA-Z0-9_+-]+)/);
        if (match) lang = match[1];
      }
      return (lang || '').toLowerCase();
    }

    function hasExplicitNoCopy(block, code) {
      var host = block.classList.contains('highlight') ? block : (block.closest('pre') || block);
      return (
        block.classList.contains('no-copy') ||
        host.classList.contains('no-copy') ||
        code.classList.contains('no-copy') ||
        block.getAttribute('data-copy') === 'off' ||
        host.getAttribute('data-copy') === 'off' ||
        code.getAttribute('data-copy') === 'off'
      );
    }

    function shouldSkipCopyButton(block, code, lang) {
      if (hasExplicitNoCopy(block, code)) {
        return true;
      }

      var normalized = (lang || '').toLowerCase();
      if (['text', 'plain', 'plaintext', 'output', 'console'].indexOf(normalized) >= 0) {
        return true;
      }
      return false;
    }

    function copyWithFallback(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      return new Promise(function (resolve, reject) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.top = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
          var ok = document.execCommand('copy');
          document.body.removeChild(ta);
          if (ok) resolve();
          else reject(new Error('execCommand copy failed'));
        } catch (e) {
          document.body.removeChild(ta);
          reject(e);
        }
      });
    }

    document.querySelectorAll('.blog-single-content .highlight, .blog-single-content pre').forEach(function (block) {
      var code = block.querySelector('code');
      if (!code) return;
      // Skip <pre> elements that are nested inside a .highlight wrapper —
      // the wrapper is already processed in the same loop iteration.
      if (block.tagName === 'PRE' && block.closest('.highlight')) return;

      var lang = detectLang(code) || 'text';
      block.setAttribute('data-code-lang', lang);
      if (block.classList.contains('highlight')) {
        var nestedPre = block.querySelector('pre');
        if (nestedPre) nestedPre.setAttribute('data-code-lang', lang);
      }

      var hasLanguageHint = !!detectLang(code);
      if (!hasLanguageHint) return;
      if (shouldSkipCopyButton(block, code, lang)) return;

      var copyHost = block.classList.contains('highlight') ? block : (block.closest('pre') || block);
      copyHost.querySelectorAll('.copy-code-button, .code-copy-button, .clipboard-button, .highlight-copy-btn').forEach(function (legacyBtn) {
        legacyBtn.remove();
      });

      if (!copyHost.querySelector('.code-copy-btn')) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'code-copy-btn';
        btn.textContent = 'Copy';
        btn.setAttribute('aria-label', 'Copy code');
        copyHost.appendChild(btn);

        btn.addEventListener('click', function () {
          var text = (code.textContent || '').replace(/\s+$/, '');
          if (!text) return;

          if (btn.dataset.resetTimer) {
            clearTimeout(Number(btn.dataset.resetTimer));
            delete btn.dataset.resetTimer;
          }

          // Immediate single-node text swap: Copy -> Copied
          btn.textContent = 'Copied';
          btn.dataset.copyState = 'copied';

          var scheduleReset = function () {
            var timer = setTimeout(function () {
              btn.textContent = 'Copy';
              delete btn.dataset.copyState;
              delete btn.dataset.resetTimer;
            }, 1200);
            btn.dataset.resetTimer = String(timer);
          };

          copyWithFallback(text)
            .then(function () {
              scheduleReset();
            })
            .catch(function () {
              btn.textContent = 'Failed';
              btn.dataset.copyState = 'copied';
              scheduleReset();
            });
        });
      }
    });
  });
</script>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="blog-single-shell">
        <article class="blog-single-article">
          <header class="blog-single-header">
            <div class="blog-single-date">{{ .Date.Format "Jan 2, 2006" }}</div>
            <h1 class="blog-single-title">{{ .Title }}</h1>
            {{ with .Params.description }}<p class="blog-single-description">{{ . }}</p>{{ end }}
          </header>
          <div class="article-style blog-single-content">
            {{ .Content }}
          </div>
          {{ with .Params.tags }}
          <div class="blog-single-tags">
            {{ range . }}
              <span class="blog-tag">#{{ . }}</span>
            {{ end }}
          </div>
          {{ end }}
          <div class="blog-single-footer">
            <a class="blog-back-link" href="{{ .CurrentSection.RelPermalink }}">
              <span aria-hidden="true">←</span>
              <span>{{ if eq .Lang "zh" }}返回博客列表{{ else }}Back to Blog{{ end }}</span>
            </a>
          </div>
        </article>
      </div>
    </div>
  </div>
</div>
{{ end }}
